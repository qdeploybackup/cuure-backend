<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cuure — Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      :root{
        --bg:#f6f8fb;--card:#ffffff;--muted:#6b7280;--accent:#2563eb;--border:#e6eefc;
      }
      
      *{box-sizing:border-box}
      body{font-family:Inter,Arial,Helvetica,sans-serif;background:var(--bg);padding:20px;color:#0f172a;margin:0}
      .wrap{max-width:1200px;margin:0 auto}
      h1{margin:0 0 8px;font-size:24px;font-weight:700}
      .subtitle{color:var(--muted);font-size:13px;margin-bottom:20px}
      
      .tabs{display:flex;gap:12px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:12px}
      .tab-btn{padding:10px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-14px}
      .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

      .card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:20px}
      
      .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
      input,select,button{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:Inter,Arial}
      button{background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:500}
      button:hover{opacity:0.9}
      
      table{width:100%;border-collapse:collapse;font-size:13px}
      thead th{background:#f9fafb;text-align:left;padding:12px;border-bottom:2px solid var(--border);color:#0b1220;font-weight:600}
      tbody tr{border-bottom:1px solid var(--border)}
      td{padding:12px}
      tr:hover{background:#f9fafb}
      
      .badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:600}
      .badge.booked{background:#dbeafe;color:#1e40af}
      .badge.pending{background:#fef3c7;color:#92400e}
      .badge.completed{background:#dcfce7;color:#166534}
      .badge.failed{background:#fee2e2;color:#991b1b}
      
      .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
      .stat-card{background:var(--card);padding:16px;border-radius:8px;text-align:center;border:1px solid var(--border)}
      .stat-value{font-size:28px;font-weight:700;color:var(--accent)}
      .stat-label{font-size:12px;color:var(--muted);margin-top:4px}
      
      .tab-content{display:none}
      .tab-content.active{display:block}
      
      .loading{text-align:center;padding:40px;color:var(--muted)}
      .error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:8px;margin-bottom:12px}

      .badge.website { background:#e0f2fe; color:#0369a1; }
      .badge.whatsapp { background:#dcfce7; color:#166534; }
      .badge.manual { background:#fef3c7; color:#92400e; }

    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Cuure Admin Dashboard</h1>
      <p class="subtitle">Manage appointments, payments, and view analytics</p>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('appointments')">📅 Appointments</button>
        <button class="tab-btn" onclick="switchTab('payments')">💳 Payments</button>
      </div>

      <!-- APPOINTMENTS TAB -->
      <div id="appointments" class="tab-content active">
        <div class="card">
          <h2>Appointments</h2>
          <div class="controls">
            <input type="text" id="appt-search" placeholder="Search patient name or phone">
            <button onclick="loadAppointments()">Search</button>
            <button onclick="exportAppointments()">📥 Export</button>
            <button onclick="openAddModal()" style="margin-left:auto">➕ Add Appointment</button>
          </div>
          <div id="appt-count" class="subtitle"></div>
          <div style="overflow-x:auto">
            <table id="appt-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Patient</th>
                  <th>Age</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Doctor</th>
                  <th>Address</th>
                  <th>Source</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="appt-tbody">
                <tr><td colspan="10" class="loading">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- PAYMENTS TAB -->
      <div id="payments" class="tab-content">
        <div class="card">
          <h2>Payment Requests</h2>
          <div class="controls">
            <input type="text" id="payment-search" placeholder="Search patient name or phone">
            <select id="payment-status">
              <option value="">All Statuses</option>
              <option value="PENDING">Pending</option>
              <option value="COMPLETED">Completed</option>
              <option value="FAILED">Failed</option>
            </select>
            <button onclick="loadPayments()">Search</button>
            <button onclick="exportPayments()">📥 Export</button>
                <button onclick="openPaymentModal()" style="margin-left:auto">➕ Add Payment</button>
          </div>
          <div id="payment-count" class="subtitle"></div>
          <div style="overflow-x:auto">
            <table id="payment-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Patient</th>
                  <th>Phone</th>
                  <th>Doctor</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="payment-tbody">
                <tr><td colspan="8" class="loading">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- ADD APPOINTMENT MODAL -->
    <div id="addModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100">
      <div style="background:white;border-radius:12px;padding:24px;max-width:600px;width:90%">
        <h2 style="margin:0 0 20px">Add Appointment Manually</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">

          <input
              id="add-phone"
              type="tel"
              placeholder="Phone (10 digits)"
              maxlength="10"
              oninput="this.value = this.value.replace(/[^0-9]/g,'')"
/>
          <input id="add-age" type="number" placeholder="Age" min="1" max="110">

          <input id="add-name" type="text" placeholder="Patient Name">
          <input id="add-date" type="date">

          <!-- TIME DROPDOWN -->
          <select id="add-time" style="grid-column:1/-1">
              <option value="">Select Time</option>
              <option value="09:00">9:00 AM – 10:00 AM</option>
              <option value="10:00">10:00 AM – 11:00 AM</option>
              <option value="11:00">11:00 AM – 12:00 PM</option>
              <option value="12:00">12:00 PM – 1:00 PM</option>
              <option value="13:00">1:00 PM – 2:00 PM</option>
              <option value="14:00">2:00 PM – 3:00 PM</option>
              <option value="15:00">3:00 PM – 4:00 PM</option>
              <option value="16:00">4:00 PM – 5:00 PM</option>
              <option value="17:00">5:00 PM – 6:00 PM</option>
              <option value="18:00">6:00 PM – 7:00 PM</option>
              <option value="19:00">7:00 PM – 8:00 PM</option>
              <option value="20:00">8:00 PM – 9:00 PM</option>
          </select>

          <input id="add-doctor" type="text" placeholder="Doctor Name">
          <input id="add-spec" type="text" placeholder="Specialization">

          <input id="add-address" type="text" placeholder="Address" style="grid-column:1/-1">

        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button onclick="closeAddModal()" style="background:#e5e7eb;color:black;border:none;padding:10px 16px;border-radius:6px;cursor:pointer">Cancel</button>
          <button onclick="submitAddAppointment()" style="background:var(--accent);color:white;border:none;padding:10px 16px;border-radius:6px;cursor:pointer">Save</button>
        </div>
      </div>
    </div>

    <!-- ADD / EDIT PAYMENT MODAL -->
    <div id="paymentModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:110">
      <div style="background:white;border-radius:12px;padding:24px;max-width:600px;width:90%">
        <h2 style="margin:0 0 20px">Add / Edit Payment</h2>
        <input id="pay-id" type="hidden">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <input id="pay-appointment-id" type="text" placeholder="Appointment ID (optional)" style="padding:10px;border:1px solid var(--border);border-radius:6px;font-family:Inter">
          <input id="pay-patient-name" type="text" placeholder="Patient Name" style="padding:10px;border:1px solid var(--border);border-radius:6px;font-family:Inter">
          <input id="pay-patient-phone" type="text" placeholder="Patient Phone" style="padding:10px;border:1px solid var(--border);border-radius:6px;font-family:Inter">
          <input id="pay-doctor-name" type="text" placeholder="Doctor Name" style="padding:10px;border:1px solid var(--border);border-radius:6px;font-family:Inter">
          <input id="pay-amount" type="text" placeholder="Amount (e.g. 250)" style="padding:10px;border:1px solid var(--border);border-radius:6px;font-family:Inter">
          <input id="pay-link" type="text" placeholder="Payment Link (optional)" style="padding:10px;border:1px solid var(--border);border-radius:6px;font-family:Inter">
          <select id="pay-status" style="padding:10px;border:1px solid var(--border);border-radius:6px;font-family:Inter">
            <option value="PENDING">PENDING</option>
            <option value="COMPLETED">COMPLETED</option>
            <option value="FAILED">FAILED</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button onclick="closePaymentModal()" style="background:#e5e7eb;color:black;border:none;padding:10px 16px;border-radius:6px;cursor:pointer">Cancel</button>
          <button onclick="submitAddPayment()" style="background:var(--accent);color:white;border:none;padding:10px 16px;border-radius:6px;cursor:pointer">Save</button>
        </div>
      </div>
    </div>

    <script>
      let appointmentsData = [];
      let paymentsData = [];

      function switchTab(name) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        event.target.classList.add('active');

        if (name === 'appointments') loadAppointments();
        else if (name === 'payments') loadPayments();
      }

      function openAddModal() {
        document.getElementById('addModal').style.display = 'flex';
      }

      function closeAddModal() {
        document.getElementById('addModal').style.display = 'none';
        document.getElementById('add-phone').value = '';
        document.getElementById('add-age').value = '';
        document.getElementById('add-name').value = '';
        document.getElementById('add-date').value = '';
        document.getElementById('add-time').value = '';
        document.getElementById('add-time').value = '';
        document.getElementById('add-doctor').value = '';
        document.getElementById('add-spec').value = '';
        document.getElementById('add-address').value = '';
      }
      async function submitAddAppointment() {
        const phone = document.getElementById('add-phone').value.trim();
        const name = document.getElementById('add-name').value.trim();
        const age = Number(document.getElementById('add-age').value);
        const date = document.getElementById('add-date').value;
        const timeSelect = document.getElementById('add-time');
        const time_value = timeSelect.value;
        const time_label = timeSelect.selectedOptions[0]?.text || '';
        const doctor_name = document.getElementById('add-doctor').value.trim();
        const doctor_specialization = document.getElementById('add-spec').value.trim();
        const address = document.getElementById('add-address').value.trim();

        /* ================= VALIDATIONS ================= */

        if (!/^\d{10}$/.test(phone)) {
            alert('Phone number must be exactly 10 digits');
            return;
          }

        if (!/^[a-zA-Z\s]+$/.test(name)) {
          alert("Patient name should contain only letters");
          return;
        }

        if (age && (age < 1 || age > 110)) {
          alert("Age must be between 1 and 110");
          return;
        }

        if (!date || !time_value || !doctor_name) {
          alert("Date, time and doctor are required");
          return;
        }

        /* ================ SAVE TO SAME DB ================= */

        try {
          const res = await fetch('/api/admin/appointments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              phone,
              patient_name: name,
              age: age || null,
              date,
              time_value,
              time_label,
              doctor_name,
              doctor_specialization,
              address
            })
          });

          const j = await res.json();
          if (!j.success) throw new Error(j.message || 'Failed');

          alert("Appointment added successfully");
          closeAddModal();
          loadAppointments(); // 👈 refresh table instantly

        } catch (e) {
          console.error(e);
          alert("Failed to add appointment");
        }
      }

      async function loadAppointments() {
        try {
          const search = document.getElementById('appt-search').value.toLowerCase();
          const res = await fetch('/api/admin/appointments');
          const j = await res.json();
          
          if (!j.success) throw new Error(j.message);
          appointmentsData = j.data || [];
          
          const filtered = appointmentsData.filter(a => 
            !search || a.patient_name?.toLowerCase().includes(search) || a.phone?.includes(search)
          );

          const tbody = document.getElementById('appt-tbody');
          tbody.innerHTML = filtered.length ? filtered.map(a => `
            <tr>
              <td>${a.id}</td>
              <td>${a.patient_name || '—'}</td>
              <td>${a.age || '-'}</td>
              <td>${a.phone || '-'}</td>
              <td>${a.email}</td> 
              <td>${a.date || '-'}</td>
              <td>${a.time_label || '-'}</td>
              <td>${a.doctor_name || '-'}</td>
              <td>${a.address || '—'}</td>
              <td>
                <span class="badge ${a.source?.toLowerCase() || 'booked'}">
                  ${a.source || 'MANUAL'}
                </span>
              </td>
              <td><span class="badge booked">✓ Booked</span></td>
            </tr>
          `).join('') : '<tr><td colspan="8" style="text-align:center;color:var(--muted)">No appointments found</td></tr>';
          
          document.getElementById('appt-count').textContent = `Showing ${filtered.length} of ${appointmentsData.length} appointments`;
        } catch (e) {
          document.getElementById('appt-tbody').innerHTML = `<tr><td colspan="8" class="error">${e.message}</td></tr>`;
        }
      }

      async function loadPayments() {
        try {
          const search = document.getElementById('payment-search').value.toLowerCase();
          const status = document.getElementById('payment-status').value;
          const res = await fetch('/api/admin/payments');
          const j = await res.json();
          
          if (!j.success) throw new Error(j.message);
          paymentsData = j.data || [];
          
          const filtered = paymentsData.filter(p => 
            (!search || p.patient_name?.toLowerCase().includes(search) || p.patient_phone?.includes(search)) &&
            (!status || p.status === status)
          );

          const tbody = document.getElementById('payment-tbody');
          tbody.innerHTML = filtered.length ? filtered.map(p => `
            <tr>
              <td>${p.id}</td>
              <td>${p.patient_name || '—'}</td>
              <td>${p.patient_phone}</td>
              <td>${p.doctor_name}</td>
              <td>₹${p.amount}</td>
              <td>
                <select id="status_${p.id}" style="padding:6px;border-radius:6px;border:1px solid var(--border)">
                  <option value="PENDING" ${p.status==='PENDING'?'selected':''}>PENDING</option>
                  <option value="COMPLETED" ${p.status==='COMPLETED'?'selected':''}>COMPLETED</option>
                  <option value="FAILED" ${p.status==='FAILED'?'selected':''}>FAILED</option>
                </select>
              </td>
              <td>${new Date(p.created_at).toLocaleDateString('en-IN')}</td>
              <td>
                <button onclick="savePaymentStatus(${p.id})" style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:#eef2ff;color:var(--accent);cursor:pointer;margin-right:6px">Save</button>
                <button onclick="openPaymentModal(${p.id})" style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:white;cursor:pointer">Edit</button>
              </td>
            </tr>
          `).join('') : '<tr><td colspan="8" style="text-align:center;color:var(--muted)">No payments found</td></tr>';
          
          document.getElementById('payment-count').textContent = `Showing ${filtered.length} of ${paymentsData.length} payments`;
        } catch (e) {
          document.getElementById('payment-tbody').innerHTML = `<tr><td colspan="8" class="error">${e.message}</td></tr>`;
        }
      }

      function exportAppointments() {
        if (!appointmentsData.length) return alert('No data to export');
        const csv = [
          ['ID', 'Patient','age', 'Phone', 'Date', 'Time', 'Doctor', 'Address'].join(','),
          ...appointmentsData.map(a => [a.id, a.patient_name,a.age, a.phone, a.date, a.time_label, a.doctor_name, a.address].map(v => `"${v || ''}"`).join(','))
        ].join('\n');
        const a = document.createElement('a');
        a.href = 'data:text/csv,' + encodeURIComponent(csv);
        a.download = 'appointments.csv';
        a.click();
      }

      function exportPayments() {
        if (!paymentsData.length) return alert('No data to export');
        const csv = [
          ['ID', 'Patient', 'Phone', 'Doctor', 'Amount', 'Status', 'Created'].join(','),
          ...paymentsData.map(p => [p.id, p.patient_name, p.patient_phone, p.doctor_name, p.amount, p.status, p.created_at].map(v => `"${v || ''}"`).join(','))
        ].join('\n');
        const a = document.createElement('a');
        a.href = 'data:text/csv,' + encodeURIComponent(csv);
        a.download = 'payments.csv';
        a.click();
      }

      // ----- PAYMENT MODAL -----
      function openPaymentModal(id) {
        const modal = document.getElementById('paymentModal');
        modal.style.display = 'flex';

        // if id provided, populate fields for edit
        if (id) {
          const p = paymentsData.find(x => x.id == id);
          if (p) {
            document.getElementById('pay-id').value = p.id;
            document.getElementById('pay-appointment-id').value = p.appointment_id || '';
            document.getElementById('pay-patient-name').value = p.patient_name || '';
            document.getElementById('pay-patient-phone').value = p.patient_phone || '';
            document.getElementById('pay-doctor-name').value = p.doctor_name || '';
            document.getElementById('pay-amount').value = p.amount || '';
            document.getElementById('pay-link').value = p.payment_link || '';
            document.getElementById('pay-status').value = p.status || 'PENDING';
          }
        } else {
          // new
          document.getElementById('pay-id').value = '';
          document.getElementById('pay-appointment-id').value = '';
          document.getElementById('pay-patient-name').value = '';
          document.getElementById('pay-patient-phone').value = '';
          document.getElementById('pay-doctor-name').value = '';
          document.getElementById('pay-amount').value = '';
          document.getElementById('pay-link').value = '';
          document.getElementById('pay-status').value = 'PENDING';
        }
      }

      function closePaymentModal() {
        const modal = document.getElementById('paymentModal');
        modal.style.display = 'none';
      }

      async function submitAddPayment() {
        const id = document.getElementById('pay-id').value;
        const payload = {
          appointment_id: document.getElementById('pay-appointment-id').value || null,
          patient_name: document.getElementById('pay-patient-name').value.trim(),
          patient_phone: document.getElementById('pay-patient-phone').value.trim(),
          doctor_name: document.getElementById('pay-doctor-name').value.trim(),
          amount: document.getElementById('pay-amount').value.trim(),
          payment_link: document.getElementById('pay-link').value.trim(),
          status: document.getElementById('pay-status').value
        };

        if (!payload.patient_phone || !payload.amount) return alert('Patient phone and amount are required');

        try {
          let res;
          if (id) {
            res = await fetch('/api/admin/payments/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
          } else {
            res = await fetch('/api/admin/payments', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
          }
          const j = await res.json();
          if (!j.success) throw new Error(j.message || 'Failed');
          alert('Payment saved');
          closePaymentModal();
          loadPayments();
        } catch (e) {
          console.error(e);
          alert('Failed to save payment: ' + (e.message || e));
        }
      }

      async function savePaymentStatus(id){
        const sel = document.getElementById('status_'+id);
        if (!sel) return alert('Status selector not found');
        const status = sel.value;

        try{
          const res = await fetch('/api/admin/payments/' + id, {
            method: 'PUT',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ status })
          });
          const j = await res.json();
          if (!j.success) throw new Error(j.message || 'Failed to update');
          alert('Status updated');
          loadPayments();
        }catch(e){
          console.error(e);
          alert('Failed to update status: '+(e.message||e));
        }
      }


      // Load on page load
      loadAppointments();
    </script>
  </body>
</html>
